name: CI - Tests unitaires et build Docker

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancela una ejecución antigua si haces un nuevo push sobre la misma rama.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests-unitaires:
    name: Tests unitaires Python
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du dépôt
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Exécution des tests unitaires pertinents
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest -q \
            tests/test_data_pipeline.py \
            tests/test_chatbot.py

  build-docker:
    name: Construction de l'image Docker
    runs-on: ubuntu-latest
    needs: tests-unitaires

    steps:
      - name: Récupération du dépôt
        uses: actions/checkout@v4

      - name: Construction de l'image
        run: |
          docker build -t puls-events-rag:ci .

      - name: Vérification du contenu de l'image
        run: |
          docker run --rm \
            --entrypoint sh \
            puls-events-rag:ci \
            -c "
              test -f /app/api/main.py &&
              test -f /app/src/rag/chatbot.py &&
              echo 'Image Docker valide.'
            "